name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: darwin
          - os: macos-latest
            arch: x64
            platform: darwin
          - os: ubuntu-latest
            arch: x64
            platform: linux
          - os: ubuntu-latest
            arch: arm64
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Install target platform native deps
        run: |
          PKG="@opentui/core-${{ matrix.platform }}-${{ matrix.arch }}"
          OTUI_VER=$(bun -e "console.log(require('@opentui/core/package.json').version)")
          TARGET_DIR="node_modules/@opentui/core-${{ matrix.platform }}-${{ matrix.arch }}"
          if [ ! -d "$TARGET_DIR" ]; then
            mkdir -p "$TARGET_DIR"
            TARBALL=$(npm pack "${PKG}@${OTUI_VER}" 2>/dev/null | tail -1)
            tar xzf "$TARBALL" --strip-components=1 -C "$TARGET_DIR"
            rm -f "$TARBALL"
          fi

      - name: Build bundle
        run: bash scripts/bundle.sh ${{ matrix.arch }} ${{ matrix.platform }}

      - name: Upload to release
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          BUNDLE="soulforge-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}"
          for i in 1 2 3; do
            gh release upload "${{ github.event.release.tag_name }}" "dist/bundle/${BUNDLE}.tar.gz" --clobber && break
            echo "Upload attempt $i failed, retrying in 10s..."
            sleep 10
          done
        env:
          GH_TOKEN: ${{ github.token }}

  checksums:
    runs-on: ubuntu-latest
    needs: bundles
    steps:
      - uses: actions/checkout@v5

      - name: Download all release assets
        run: |
          gh release download "${{ github.event.release.tag_name }}" --dir assets --pattern '*.tar.gz'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate SHA256SUMS
        run: |
          cd assets
          sha256sum *.tar.gz | tee SHA256SUMS.txt

      - name: Upload checksums to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" assets/SHA256SUMS.txt --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew:
    runs-on: ubuntu-latest
    needs: checksums
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: |
          gh release download "${{ github.event.release.tag_name }}" --dir assets --pattern 'SHA256SUMS.txt'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract SHA256 per platform
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            SHA=$(grep "soulforge-${VERSION}-${platform}.tar.gz" assets/SHA256SUMS.txt | awk '{print $1}')
            KEY=$(echo "$platform" | tr '-' '_')
            echo "${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
            echo "  ${platform}: ${SHA}"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v5
        with:
          repository: ProxySoul/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          SHA_DARWIN_X64: ${{ steps.sha.outputs.darwin_x64 }}
          SHA_LINUX_X64: ${{ steps.sha.outputs.linux_x64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/soulforge.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          class Soulforge < Formula
            desc "Graph-powered code intelligence"
            homepage "https://github.com/ProxySoul/soulforge"
            version "${VERSION}"
            license "BUSL-1.1"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              # Stage everything in libexec — install phase runs in a sandbox
              # where HOME is a temp dir, so we can't write to ~/.soulforge/ here
              libexec.install Dir["*"]

              # Wrapper scripts use $HOME (shell expansion at runtime, not Ruby
              # interpolation at install time) so they resolve to the real home dir
              (bin/"soulforge").write <<~SH
                #!/bin/bash
                exec "$HOME/.soulforge/bin/soulforge" "$@"
              SH
              (bin/"sf").write <<~SH
                #!/bin/bash
                exec "$HOME/.soulforge/bin/soulforge" "$@"
              SH
              chmod 0755, bin/"soulforge"
              chmod 0755, bin/"sf"
            end

            def post_install
              # post_install runs outside the sandbox with the real HOME
              system "#{libexec}/install.sh", "--quiet"
            end

            def caveats
              <<~EOS
                SoulForge installed to ~/.soulforge/
                Run 'soulforge' or 'sf' to start.
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/soulforge --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/soulforge.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "soulforge ${{ steps.version.outputs.version }}"
          git push

  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
